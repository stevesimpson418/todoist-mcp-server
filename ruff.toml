# ruff.toml — Project-level ruff configuration
line-length = 100
target-version = "py312"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = ["E501"]
fixable = ["ALL"]

[lint.isort]
known-first-party = ["todoist_mcp_server"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**" = ["S101"]

[format]
quote-style = "double"
line-ending = "lf"
